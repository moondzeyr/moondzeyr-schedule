<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moondzeyr's Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121212;
    --bg-raised: #191919;
    --card: #1E1E1E;
    --border: #2A2A2A;
    --text: #EDEAE3;
    --text-dim: #9A9690;
    --text-faint: #625E58;

    /* production type colors (board card left-edge) */
    --filming: #E8A33D;
    --photo: #C77B7B;
    --hybrid: #8B7FD6;

    /* category colors (SUTD vs Personal — used on calendar + toggles) */
    --sutd: #5B8DEF;
    --personal: #6FBF73;

    --tbc: #E15C56;
    --waiting-me: #E8A33D;
    --waiting-other: #E15C56;
    --radius: 10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  ::selection{background:var(--filming); color:#121212;}

  .sprocket-strip{
    height:14px;
    width:100%;
    background-image: repeating-linear-gradient(90deg, var(--border) 0 8px, transparent 8px 20px);
    background-position: 6px 50%;
    background-size: 20px 8px;
    background-repeat: repeat-x;
    background-color: var(--bg-raised);
    border-bottom:1px solid var(--border);
  }

  header{
    background:var(--bg-raised);
    padding:28px 24px 20px;
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    max-width:1100px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .logo{
    width:42px;
    height:42px;
    border-radius:8px;
    object-fit:cover;
    flex-shrink:0;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:28px;
    letter-spacing:-0.02em;
  }
  .subtitle{
    color:var(--text-dim);
    font-size:13px;
    margin-top:4px;
    font-family:'JetBrains Mono', monospace;
  }
  .header-actions{display:flex; gap:8px; flex-wrap:wrap;}

  button{
    font-family:'Inter', sans-serif;
    cursor:pointer;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    padding:9px 14px;
    border-radius:var(--radius);
    font-size:13px;
    font-weight:500;
    transition:border-color .15s, background .15s;
  }
  button:hover{border-color:var(--text-faint);}
  button:focus-visible{outline:2px solid var(--filming); outline-offset:2px;}
  button.primary{
    background:var(--filming);
    color:#161207;
    border-color:var(--filming);
    font-weight:600;
  }
  button.primary:hover{background:#f0ae4d;}
  button.ghost{background:transparent;}

  main{max-width:1100px; margin:0 auto; padding:24px;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:20px;
  }
  .view-toggle{
    display:inline-flex;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:3px;
  }
  .view-toggle button{
    border:none;
    background:transparent;
    padding:7px 16px;
    border-radius:7px;
  }
  .view-toggle button.active{background:var(--bg-raised); color:var(--filming);}

  .cat-toggles{display:flex; gap:10px; flex-wrap:wrap;}
  .cat-chip{
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:6px 12px 6px 8px;
    font-size:12px;
    cursor:pointer;
    user-select:none;
    transition:opacity .15s;
  }
  .cat-chip input{accent-color: var(--filming); cursor:pointer;}
  .cat-chip.off{opacity:0.4;}
  .cat-chip .swatch{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .cat-chip.sutd .swatch{background:var(--sutd);}
  .cat-chip.personal .swatch{background:var(--personal);}

  .legend{display:flex; gap:16px; font-size:11px; color:var(--text-dim); flex-wrap:wrap; margin-bottom:18px;}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.filming{background:var(--filming);}
  .dot.photo{background:var(--photo);}
  .dot.hybrid{background:var(--hybrid);}

  /* BOARD SECTIONS */
  .board-section{margin-bottom:36px;}
  .board-section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .board-section-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Space Grotesk', sans-serif;
    font-size:16px;
    font-weight:600;
  }
  .board-section-title .swatch{width:10px; height:10px; border-radius:50%;}
  .board-section.sutd .swatch{background:var(--sutd);}
  .board-section.personal .swatch{background:var(--personal);}

  .board{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:14px;
  }
  @media(max-width:900px){ .board{grid-template-columns:repeat(2, 1fr);} }
  @media(max-width:560px){ .board{grid-template-columns:1fr;} }

  .column{
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:12px;
    min-height:100px;
  }
  .column-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--text-dim);
  }
  .count-badge{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:2px 8px;
    font-size:10px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-left:3px solid var(--text-faint);
    border-radius:8px;
    padding:11px 11px 9px;
    margin-bottom:10px;
  }
  .card.filming{border-left-color:var(--filming);}
  .card.photo{border-left-color:var(--photo);}
  .card.hybrid{border-left-color:var(--hybrid);}

  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .card-title{font-size:13.5px; font-weight:600; line-height:1.35;}
  .card-type{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--text-dim);
    margin-top:5px;
  }
  .card-date{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    margin-top:6px;
  }
  .card-date.tbc{
    color:var(--tbc);
    font-weight:600;
  }
  .card-notes{
    font-size:11.5px;
    color:var(--text-dim);
    margin-top:6px;
    line-height:1.4;
  }
  .waiting-badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:10.5px;
    font-family:'JetBrains Mono', monospace;
    padding:3px 8px;
    border-radius:20px;
    margin-top:7px;
    font-weight:500;
  }
  .waiting-badge.me{ background:rgba(232,163,61,0.14); color:var(--waiting-me); }
  .waiting-badge.other{ background:rgba(225,92,86,0.14); color:var(--waiting-other); }
  .card-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    gap:6px;
  }
  .card-controls select{
    background:var(--bg-raised);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:6px;
    padding:5px 6px;
    font-size:10.5px;
    font-family:'Inter', sans-serif;
    max-width:110px;
  }
  .planning-row{
    margin-top:9px;
  }
  .planning-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    width:100%;
    justify-content:center;
    background:var(--bg-raised);
    border:1px dashed var(--border);
    color:var(--text-dim);
    padding:7px 8px;
    border-radius:7px;
    font-size:11px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    transition:border-color .15s, color .15s;
  }
  .planning-btn:hover{ border-color:var(--filming); color:var(--text); }
  .planning-btn.has-content{
    border-style:solid;
    border-color:var(--filming);
    color:var(--filming);
  }

  .planning-overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.7);
    z-index:60;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .planning-overlay.show{display:flex;}
  .planning-modal{
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:var(--radius);
    width:100%;
    max-width:720px;
    height:85vh;
    display:flex;
    flex-direction:column;
    padding:20px;
  }
  .planning-modal-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:6px;
    gap:10px;
  }
  .planning-modal-title{
    font-family:'Space Grotesk', sans-serif;
    font-size:17px;
    font-weight:600;
  }
  .planning-modal-sub{
    font-size:11px;
    color:var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    margin-top:3px;
  }
  .planning-textarea{
    flex:1;
    width:100%;
    margin-top:10px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:16px;
    border-radius:8px;
    font-size:14.5px;
    line-height:1.6;
    font-family:'Inter', sans-serif;
    resize:none;
    overflow-y:auto;
  }
  .planning-textarea:focus{ outline:2px solid var(--filming); outline-offset:1px; }
  .planning-textarea ul{ padding-left:20px; margin:6px 0; }
  .planning-textarea:empty:before{
    content: attr(data-placeholder);
    color:var(--text-faint);
  }
  .planning-toolbar{
    display:flex;
    gap:6px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  .fmt-btn{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text-dim);
    width:32px;
    height:32px;
    border-radius:6px;
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .fmt-btn:hover{ color:var(--text); border-color:var(--text-faint); }
  .fmt-btn.b{ font-weight:700; }
  .fmt-btn.u{ text-decoration:underline; }
  .fmt-btn.s{ text-decoration:line-through; }
  .planning-modal-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:12px;
  }
  .planning-status{
    font-size:11px;
    color:var(--text-faint);
    font-family:'JetBrains Mono', monospace;
  }
  .icon-btn{
    background:transparent;
    border:none;
    padding:4px 6px;
    font-size:13px;
    color:var(--text-faint);
  }
  .icon-btn:hover{color:var(--tbc);}

  .empty-col{
    color:var(--text-faint);
    font-size:11px;
    text-align:center;
    padding:16px 0;
    font-style:italic;
  }
  .empty-board{
    color:var(--text-faint);
    font-size:12.5px;
    text-align:center;
    padding:24px;
    border:1px dashed var(--border);
    border-radius:var(--radius);
    font-style:italic;
  }

  /* CALENDAR VIEW */
  .cal-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .cal-month-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:18px;
    font-weight:600;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
  }
  .cal-dow{
    text-align:center;
    font-size:11px;
    color:var(--text-faint);
    font-family:'JetBrains Mono', monospace;
    padding-bottom:4px;
  }
  .cal-cell{
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:8px;
    min-height:78px;
    padding:6px;
    font-size:11px;
  }
  .cal-cell.empty{background:transparent; border-color:transparent;}
  .cal-cell.today{border-color:var(--filming);}
  .cal-daynum{color:var(--text-dim); font-family:'JetBrains Mono', monospace; margin-bottom:4px;}
  .cal-entry{
    background:var(--card);
    border-left:2px solid var(--text-faint);
    border-radius:4px;
    padding:2px 5px;
    margin-bottom:3px;
    font-size:10px;
    line-height:1.3;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .cal-entry.sutd{border-left-color:var(--sutd);}
  .cal-entry.personal{border-left-color:var(--personal);}

  /* MODAL */
  .overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    z-index:50;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--bg-raised);
    border:1px solid var(--border);
    border-radius:var(--radius);
    width:100%;
    max-width:440px;
    padding:22px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:18px;
    margin-bottom:16px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--text-dim);
    margin-bottom:6px;
    font-family:'JetBrains Mono', monospace;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 10px;
    border-radius:7px;
    font-size:14px;
    font-family:'Inter', sans-serif;
  }
  .field textarea{resize:vertical; min-height:56px;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--filming); outline-offset:1px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}

  footer{
    max-width:1100px;
    margin:30px auto 0;
    padding:0 24px;
    color:var(--text-faint);
    font-size:11px;
    font-family:'JetBrains Mono', monospace;
    text-align:center;
  }

  #importFile{display:none;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

<script>
const STORAGE_KEY = 'moondzeyr-schedule-v3';

const seedData = [
  {id: cryptoId(), title:"ITE interview discovery piscine", board:"sutd", type:"filming", status:"not-started", date:"2026-07-07", waitingOn:"na", notes:""},
  {id: cryptoId(), title:"What can teams build with AI in 48 hours?", board:"sutd", type:"filming", status:"post-production", date:"", waitingOn:"sutd", notes:"Waiting for more interview videos & SaaS animation update"},
  {id: cryptoId(), title:"Human AI Innovator — AI Lab video", board:"sutd", type:"filming", status:"post-production", date:"2026-07-03", waitingOn:"me", notes:"First draft due"},
  {id: cryptoId(), title:"Domain x AI x Design: Prototyping with AI", board:"sutd", type:"filming", status:"not-started", date:"", waitingOn:"na", notes:"Starts once the course begins"},
  {id: cryptoId(), title:"Advice to Pisciners", board:"sutd", type:"filming", status:"post-production", date:"2026-07-07", waitingOn:"me", notes:"Edit deadline 9/7"},
  {id: cryptoId(), title:"Father & Son / Father & Daughter videos", board:"sutd", type:"filming", status:"not-started", date:"2026-07-15", waitingOn:"na", notes:"Date not fully confirmed"}
];

function cryptoId(){
  return 'id-' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

function loadEntries(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(seedData));
    return JSON.parse(JSON.stringify(seedData));
  }
  try{ return JSON.parse(raw); }catch(e){ return []; }
}
function saveEntries(entries){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

let entries = loadEntries();
let currentView = 'board';
let calDate = new Date();
let showSutd = true;
let showPersonal = true;

const TYPE_LABELS = {filming:'Filming', photo:'Photo taking', hybrid:'Hybrid (both)'};
const BOARD_LABELS = {sutd:'SUTD Academy', personal:'Personal & Freelance'};
const WAITING_LABELS = {me:'Me', sutd:'SUTD', client:'Client', na:'Not applicable'};
const WAITING_OPTIONS_BY_BOARD = {
  sutd: ['me','sutd','na'],
  personal: ['me','client','na']
};
const STATUS_COLS = [
  {key:'not-started', label:'Not started'},
  {key:'post-production', label:'In post-production'},
  {key:'revision', label:'In revision'},
  {key:'done', label:'Done'}
];

function fmtDate(d){
  if(!d) return null;
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${day} ${months[parseInt(m,10)-1]} ${y}`;
}

function visibleBoards(){
  const boards = [];
  if(showSutd) boards.push('sutd');
  if(showPersonal) boards.push('personal');
  return boards;
}

// ---------- BOARD RENDER ----------
function renderBoard(){
  const container = document.getElementById('boardView');
  container.innerHTML = '';
  const boards = visibleBoards();

  if(boards.length === 0){
    container.innerHTML = '<div class="empty-board">Both boards are hidden — flip a toggle above to see your work.</div>';
    return;
  }

  boards.forEach(boardKey => {
    const section = document.createElement('div');
    section.className = `board-section ${boardKey}`;
    const boardEntries = entries.filter(e => e.board === boardKey);

    section.innerHTML = `
      <div class="board-section-head">
        <div class="board-section-title"><span class="swatch"></span>${BOARD_LABELS[boardKey]}</div>
      </div>
    `;

    if(boardEntries.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-board';
      empty.textContent = boardKey === 'personal'
        ? "No personal or freelance projects logged yet — add one whenever."
        : "Nothing on this board yet.";
      section.appendChild(empty);
      container.appendChild(section);
      return;
    }

    const boardDiv = document.createElement('div');
    boardDiv.className = 'board';
    STATUS_COLS.forEach(col => {
      const colEntries = boardEntries.filter(e => e.status === col.key);
      const colDiv = document.createElement('div');
      colDiv.className = 'column';
      colDiv.innerHTML = `
        <div class="column-head">
          <span>${col.label}</span>
          <span class="count-badge">${colEntries.length}</span>
        </div>
      `;
      if(colEntries.length === 0){
        const empty = document.createElement('div');
        empty.className = 'empty-col';
        empty.textContent = 'Nothing here';
        colDiv.appendChild(empty);
      }
      colEntries.forEach(entry => colDiv.appendChild(renderCard(entry)));
      boardDiv.appendChild(colDiv);
    });
    section.appendChild(boardDiv);
    container.appendChild(section);
  });
}

function renderCard(entry){
  const card = document.createElement('div');
  card.className = `card ${entry.type}`;
  const dateLabel = fmtDate(entry.date);
  const dateHtml = dateLabel
    ? `<div class="card-date">${dateLabel}</div>`
    : `<div class="card-date tbc">⚑ Date TBC</div>`;

  const showWaiting = (entry.status === 'post-production' || entry.status === 'revision')
    && entry.waitingOn && entry.waitingOn !== 'na';
  const waitingClass = entry.waitingOn === 'me' ? 'me' : 'other';
  const waitingHtml = showWaiting
    ? `<div class="waiting-badge ${waitingClass}">⏳ Waiting on: ${WAITING_LABELS[entry.waitingOn]}</div>`
    : '';

  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-title">${escapeHtml(entry.title)}</div>
        <div class="card-type">${TYPE_LABELS[entry.type]}</div>
      </div>
      <button class="icon-btn edit-btn" title="Edit">✎</button>
    </div>
    ${dateHtml}
    ${waitingHtml}
    ${entry.notes ? `<div class="card-notes">${escapeHtml(entry.notes)}</div>` : ''}
    <div class="planning-row">
      <button class="planning-btn ${planningHasContent(entry.planning) ? 'has-content' : ''}" data-id="${entry.id}">
        ${planningHasContent(entry.planning) ? '📝 Open planning notes' : '+ Add planning notes'}
      </button>
    </div>
    <div class="card-controls">
      <select class="status-select">
        <option value="not-started">Not started</option>
        <option value="post-production">In post-production</option>
        <option value="revision">In revision</option>
        <option value="done">Done</option>
      </select>
      <button class="icon-btn delete-btn" title="Delete">✕</button>
    </div>
  `;
  card.querySelector('.status-select').value = entry.status;
  card.querySelector('.status-select').addEventListener('change', (e) => {
    entry.status = e.target.value;
    saveEntries(entries);
    renderAll();
  });
  card.querySelector('.delete-btn').addEventListener('click', () => {
    if(confirm(`Delete "${entry.title}"?`)){
      entries = entries.filter(x => x.id !== entry.id);
      saveEntries(entries);
      renderAll();
    }
  });
  card.querySelector('.edit-btn').addEventListener('click', () => openModal(entry));
  card.querySelector('.planning-btn').addEventListener('click', () => openPlanning(entry));
  return card;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function planningHasContent(html){
  if(!html) return false;
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent.trim().length > 0;
}

// ---------- CALENDAR RENDER ----------
function renderCalendar(){
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calLabel').textContent = `${monthNames[month]} ${year}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const dow = document.createElement('div');
    dow.className = 'cal-dow';
    dow.textContent = d;
    grid.appendChild(dow);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  const boards = visibleBoards();

  for(let i=0; i<firstDay; i++){
    const empty = document.createElement('div');
    empty.className = 'cal-cell empty';
    grid.appendChild(empty);
  }

  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (dateStr === todayStr ? ' today' : '');
    const dayEntries = entries.filter(e => e.date === dateStr && boards.includes(e.board));
    let entriesHtml = dayEntries.map(e =>
      `<div class="cal-entry ${e.board}" title="${escapeHtml(e.title)} (${BOARD_LABELS[e.board]})">${escapeHtml(e.title)}</div>`
    ).join('');
    cell.innerHTML = `<div class="cal-daynum">${day}</div>${entriesHtml}`;
    grid.appendChild(cell);
  }
}

// ---------- VIEW SWITCHING ----------
function renderAll(){
  if(currentView === 'board') renderBoard();
  else renderCalendar();
}

document.getElementById('boardTabBtn').addEventListener('click', () => {
  currentView = 'board';
  document.getElementById('boardTabBtn').classList.add('active');
  document.getElementById('calTabBtn').classList.remove('active');
  document.getElementById('boardView').style.display = 'block';
  document.getElementById('calView').style.display = 'none';
  renderAll();
});
document.getElementById('calTabBtn').addEventListener('click', () => {
  currentView = 'cal';
  document.getElementById('calTabBtn').classList.add('active');
  document.getElementById('boardTabBtn').classList.remove('active');
  document.getElementById('boardView').style.display = 'none';
  document.getElementById('calView').style.display = 'block';
  renderAll();
});
document.getElementById('prevMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); });
document.getElementById('nextMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); });

// ---------- CATEGORY TOGGLES ----------
const chipSutd = document.getElementById('chipSutd');
const chipPersonal = document.getElementById('chipPersonal');
document.getElementById('toggleSutd').addEventListener('change', (e) => {
  showSutd = e.target.checked;
  chipSutd.classList.toggle('off', !showSutd);
  renderAll();
});
document.getElementById('togglePersonal').addEventListener('change', (e) => {
  showPersonal = e.target.checked;
  chipPersonal.classList.toggle('off', !showPersonal);
  renderAll();
});

// ---------- MODAL ----------
const overlay = document.getElementById('overlay');

function populateWaitingOptions(boardKey, selected){
  const sel = document.getElementById('fWaiting');
  sel.innerHTML = '';
  WAITING_OPTIONS_BY_BOARD[boardKey].forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = WAITING_LABELS[key];
    sel.appendChild(opt);
  });
  sel.value = selected && WAITING_OPTIONS_BY_BOARD[boardKey].includes(selected) ? selected : 'na';
}

document.getElementById('fBoard').addEventListener('change', (e) => {
  populateWaitingOptions(e.target.value, null);
});

function openModal(entry){
  document.getElementById('modalTitle').textContent = entry ? 'Edit entry' : 'New entry';
  document.getElementById('editId').value = entry ? entry.id : '';
  document.getElementById('fTitle').value = entry ? entry.title : '';
  const boardVal = entry ? entry.board : 'sutd';
  document.getElementById('fBoard').value = boardVal;
  document.getElementById('fType').value = entry ? entry.type : 'filming';
  document.getElementById('fDate').value = entry ? entry.date : '';
  document.getElementById('fStatus').value = entry ? entry.status : 'not-started';
  populateWaitingOptions(boardVal, entry ? entry.waitingOn : 'na');
  document.getElementById('fNotes').value = entry ? entry.notes : '';
  overlay.classList.add('show');
  document.getElementById('fTitle').focus();
}
function closeModal(){ overlay.classList.remove('show'); }

document.getElementById('addBtn').addEventListener('click', () => openModal(null));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

document.getElementById('saveBtn').addEventListener('click', () => {
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ alert('Give it a title first.'); return; }
  const id = document.getElementById('editId').value;
  const data = {
    title,
    board: document.getElementById('fBoard').value,
    type: document.getElementById('fType').value,
    date: document.getElementById('fDate').value,
    status: document.getElementById('fStatus').value,
    waitingOn: document.getElementById('fWaiting').value,
    notes: document.getElementById('fNotes').value.trim()
  };
  if(id){
    const idx = entries.findIndex(e => e.id === id);
    if(idx > -1) entries[idx] = {...entries[idx], ...data};
  }else{
    entries.push({id: cryptoId(), ...data});
  }
  saveEntries(entries);
  closeModal();
  renderAll();
});

// ---------- EXPORT / IMPORT ----------
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `moondzeyr-schedule-backup-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try{
      const imported = JSON.parse(evt.target.result);
      if(!Array.isArray(imported)) throw new Error('bad format');
      if(confirm(`Import ${imported.length} entries? This replaces everything currently on this device.`)){
        entries = imported;
        saveEntries(entries);
        renderAll();
      }
    }catch(err){
      alert('That file doesn\'t look like a valid backup.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ---------- PLANNING NOTES ----------
const planningOverlay = document.getElementById('planningOverlay');
const planningTextarea = document.getElementById('planningTextarea');
const planningStatus = document.getElementById('planningStatus');
let currentPlanningId = null;
let planningSaveTimer = null;

function openPlanning(entry){
  currentPlanningId = entry.id;
  document.getElementById('planningTitle').textContent = entry.title;
  planningTextarea.innerHTML = entry.planning || '';
  planningStatus.textContent = 'Saved';
  planningOverlay.classList.add('show');
  setTimeout(() => planningTextarea.focus(), 50);
}

function closePlanning(){
  planningOverlay.classList.remove('show');
  currentPlanningId = null;
  renderAll();
}

planningTextarea.addEventListener('input', () => {
  planningStatus.textContent = 'Saving...';
  clearTimeout(planningSaveTimer);
  planningSaveTimer = setTimeout(() => {
    const idx = entries.findIndex(e => e.id === currentPlanningId);
    if(idx > -1){
      entries[idx].planning = planningTextarea.innerHTML;
      saveEntries(entries);
      planningStatus.textContent = 'Saved';
    }
  }, 400);
});

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    planningTextarea.focus();
    document.execCommand(btn.dataset.cmd, false, null);
    planningTextarea.dispatchEvent(new Event('input'));
  });
});

document.getElementById('planningCloseBtn').addEventListener('click', closePlanning);
planningOverlay.addEventListener('click', (e) => { if(e.target === planningOverlay) closePlanning(); });
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && planningOverlay.classList.contains('show')) closePlanning();
});

// ---------- INIT ----------
renderAll();
</script>

</body>
</html>
